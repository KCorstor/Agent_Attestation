<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attstr Payment Demo Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero__inner">
          <p class="hero__eyebrow">Machine Payments Protocol · Tempo</p>
          <h1 class="hero__title">Attstr Payment Demo Flow</h1>
          <div class="hero__actions">
            <button type="button" class="btn btn--primary" id="runAllBtn">Run all steps</button>
            <a class="btn btn--primary" href="./flow.html" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center">Sequence diagram</a>
          </div>
          <p class="hero__hint" id="statusHint"></p>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--steps" aria-labelledby="stepsHeading">
          <h2 id="stepsHeading" class="panel__title">Checkout phases</h2>
          <div class="steps-scroll">
            <ol class="steps" id="stepsList"></ol>
          </div>
          <div class="nav-row">
            <button type="button" class="btn btn--ghost" id="prevBtn" disabled>← Previous</button>
            <button type="button" class="btn btn--ghost" id="nextBtn" disabled>Next →</button>
          </div>
        </section>

        <section class="panel panel--detail" aria-label="Selected phase">
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-actions" id="detailActions" hidden>
            <button type="button" class="btn btn--primary" id="runSelectedStepBtn">
              Run this step
            </button>
          </div>
          <h3 class="subhead">Last payload (JSON)</h3>
          <pre class="json" id="jsonOut"><code>// Run all steps or select a phase</code></pre>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
